<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/scripts.js" async></script>
  </head>
  <body>
    <div class="page-container">
      <div class="header">
        <div class="Logo">
          <a
            href="https://www.linkedin.com/in/zachary-kline-961307b2/"
            id="Logo"
            >zjk</a
          >
        </div>
        <div class="hello-container">
          <h2 id="hello">Hi! I'm Zachary John Kline.</h2>
        </div>
      </div>
      <div class="body-container">
        <div class="profile-pic">
          <div class="tagline-area">
            <h2 class="tagline">
              I <span id="change-words">design</span> memorable, and
              <br />lasting, brand experiences.
            </h2>
            <img src="images/squares.svg" alt="" class="Squares" />
            <div class="Tinted-Magenta"></div>
            <div class="Profile-Pic-Container">
              <img
                src="images/profile-pic.png"
                alt=""
                class="Profile-Pic-Img"
              />
            </div>
          </div>
        </div>
        <div class="down-arrow-container">
          <img src="images/arrow_down.svg" alt="" class="Down-Arrow" />
        </div>
        <div class="Skills">
          <div class="Skills-Visuals">
            <div class="Skills-Words-Container">
              <p class="Skills-Words">
                A lead designer with over a decade of experience designing a
                wide variety of deliverables from digital to print to product.
              </p>
            </div>
            <div class="pie-chart-container">
              <img src="images/pie_chart.svg" alt="" class="Pie-chart" />
            </div>
          </div>
          <div class="Bottom-Skills-Container">
            <p class="Skills-Written">
              front end development • ux/ui design • illustration • motion
              graphics • product
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
